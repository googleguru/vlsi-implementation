<svg xmlns="http://www.w3.org/2000/svg" width="660" height="240" viewBox="0 0 660 240">
  <style>
    .bg  { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1; }
    .box { fill:#dbeafe; stroke:#1d4ed8; stroke-width:1.5; }
    .wp  { fill:#fef9c3; stroke:#ca8a04; stroke-width:1.5; }
    .w   { stroke:#374151; stroke-width:1.2; fill:none; }
    .ww  { stroke:#dc2626; stroke-width:1.5; fill:none; stroke-dasharray:4,3; }
    .arr { stroke:#374151; stroke-width:1.2; fill:#374151; }
    .tb  { font-family:monospace; font-size:12px; font-weight:bold; }
    .ti  { font-family:monospace; font-size:10px; fill:#6b7280; }
    .hl  { font-family:monospace; font-size:14px; font-weight:bold; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
    <marker id="rr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="660" height="240" rx="8" class="bg"/>
  <text x="330" y="22" text-anchor="middle" class="hl" fill="#1e3a5f">CA Rule-235 — 8-cell Row with Wrap-around Boundary</text>

  <!-- 8 cells, x positions: 20,100,180,...,580; centers at 60,140,...,620 -->
  <!-- Cell width=60, gap=20; start x=20 -->
  <!-- centers: 50,130,210,290,370,450,530,610 -->

  <!-- state[i] input arrows from top -->
  <!-- Cell boxes -->
  <!-- i=0: x=20, center=50 -->
  <!-- i=7: x=580, center=610 -->

  <!-- Draw 8 cell boxes -->
  <rect x="18"  y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="98"  y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="178" y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="258" y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="338" y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="418" y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="498" y="80" width="60" height="50" rx="5" class="box"/>
  <rect x="578" y="80" width="60" height="50" rx="5" class="box"/>

  <!-- Cell labels -->
  <text x="48"  y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₀</text>
  <text x="128" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₁</text>
  <text x="208" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₂</text>
  <text x="288" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₃</text>
  <text x="368" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₄</text>
  <text x="448" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₅</text>
  <text x="528" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₆</text>
  <text x="608" y="101" text-anchor="middle" class="tb" fill="#1d4ed8">C₇</text>

  <!-- state[i] subtext -->
  <text x="48"  y="118" text-anchor="middle" class="ti">s[0]</text>
  <text x="128" y="118" text-anchor="middle" class="ti">s[1]</text>
  <text x="208" y="118" text-anchor="middle" class="ti">s[2]</text>
  <text x="288" y="118" text-anchor="middle" class="ti">s[3]</text>
  <text x="368" y="118" text-anchor="middle" class="ti">s[4]</text>
  <text x="448" y="118" text-anchor="middle" class="ti">s[5]</text>
  <text x="528" y="118" text-anchor="middle" class="ti">s[6]</text>
  <text x="608" y="118" text-anchor="middle" class="ti">s[7]</text>

  <!-- L/C/R labels inside each cell (tiny) -->
  <text x="48"  y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="128" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="208" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="288" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="368" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="448" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="528" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>
  <text x="608" y="123" text-anchor="middle" class="ti">R|~(L^C)</text>

  <!-- Local L→R connections between adjacent cells (horizontal arrows) -->
  <line x1="78"  y1="105" x2="98"  y2="105" class="w" marker-end="url(#ah)"/>
  <line x1="158" y1="105" x2="178" y2="105" class="w" marker-end="url(#ah)"/>
  <line x1="238" y1="105" x2="258" y2="105" class="w" marker-end="url(#ah)"/>
  <line x1="318" y1="105" x2="338" y2="105" class="w" marker-end="url(#ah)"/>
  <line x1="398" y1="105" x2="418" y2="105" class="w" marker-end="url(#ah)"/>
  <line x1="478" y1="105" x2="498" y2="105" class="w" marker-end="url(#ah)"/>
  <line x1="558" y1="105" x2="578" y2="105" class="w" marker-end="url(#ah)"/>

  <!-- Wrap-around: C₇.R → C₀.L (arc above, red dashed) -->
  <path d="M 608 80 C 608 45, 48 45, 48 80" class="ww" marker-end="url(#rr)"/>
  <text x="328" y="42" text-anchor="middle" font-family="monospace" font-size="10px" fill="#dc2626">wrap: s[7]→L of C₀   /   s[0]→R of C₇</text>

  <!-- Wrap-around: C₀.L ← C₇ (bottom, conceptually shown via label) -->
  <path d="M 48 130 C 48 175, 608 175, 608 130" class="ww"/>

  <!-- next_state output arrows (down from each cell) -->
  <line x1="48"  y1="130" x2="48"  y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="128" y1="130" x2="128" y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="208" y1="130" x2="208" y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="288" y1="130" x2="288" y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="368" y1="130" x2="368" y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="448" y1="130" x2="448" y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="528" y1="130" x2="528" y2="155" class="w" marker-end="url(#ah)"/>
  <line x1="608" y1="130" x2="608" y2="155" class="w" marker-end="url(#ah)"/>

  <!-- next_state labels -->
  <text x="48"  y="168" text-anchor="middle" class="ti">ns[0]</text>
  <text x="128" y="168" text-anchor="middle" class="ti">ns[1]</text>
  <text x="208" y="168" text-anchor="middle" class="ti">ns[2]</text>
  <text x="288" y="168" text-anchor="middle" class="ti">ns[3]</text>
  <text x="368" y="168" text-anchor="middle" class="ti">ns[4]</text>
  <text x="448" y="168" text-anchor="middle" class="ti">ns[5]</text>
  <text x="528" y="168" text-anchor="middle" class="ti">ns[6]</text>
  <text x="608" y="168" text-anchor="middle" class="ti">ns[7]</text>

  <!-- Legend -->
  <rect x="18" y="192" width="620" height="38" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="328" y="208" text-anchor="middle" font-family="monospace" font-size="10px" fill="#166534">
    state[N-1:0] → 8 parallel ca235_cell instances (genvar) → next_state[N-1:0]
  </text>
  <text x="328" y="223" text-anchor="middle" font-family="monospace" font-size="10px" fill="#166534">
    C₀: L=s[7], C=s[0], R=s[1]   ···   C₇: L=s[6], C=s[7], R=s[0]   (wrap-around)
  </text>
</svg>
