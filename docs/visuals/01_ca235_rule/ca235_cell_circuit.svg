<svg xmlns="http://www.w3.org/2000/svg" width="580" height="210" viewBox="0 0 580 210">
  <style>
    .w  { stroke:#374151; stroke-width:1.5; fill:none; }
    .g1 { fill:#dbeafe; stroke:#1d4ed8; stroke-width:1.5; }
    .g2 { fill:#fce7f3; stroke:#be185d; stroke-width:1.5; }
    .g3 { fill:#dcfce7; stroke:#15803d; stroke-width:1.5; }
    .bg { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1; }
    .ti { font-family:monospace; font-size:11px; fill:#6b7280; }
    .tb { font-family:monospace; font-size:13px; font-weight:bold; }
    .hl { font-family:monospace; font-size:15px; font-weight:bold; }
  </style>

  <rect width="580" height="210" rx="8" class="bg"/>

  <!-- Title -->
  <text x="290" y="24" text-anchor="middle" class="hl" fill="#1e3a5f">CA Rule-235 Cell Gate Circuit</text>
  <text x="290" y="41" text-anchor="middle" class="ti">next = R | &#126;(L &#8853; C)</text>

  <!-- Input labels and entry points -->
  <text x="12" y="82"  class="tb" fill="#374151">L</text>
  <text x="12" y="115" class="tb" fill="#374151">C</text>
  <text x="12" y="165" class="tb" fill="#374151">R</text>

  <!-- Input wires to XOR -->
  <line x1="28" y1="79"  x2="135" y2="79"  class="w"/>
  <line x1="28" y1="112" x2="135" y2="112" class="w"/>

  <!-- XOR gate box -->
  <rect x="135" y="58" width="85" height="73" rx="6" class="g1"/>
  <text x="177" y="90"  text-anchor="middle" class="tb" fill="#1d4ed8">XOR</text>
  <text x="177" y="106" text-anchor="middle" class="ti">L &#8853; C</text>
  <text x="177" y="121" text-anchor="middle" class="ti">2 inputs</text>

  <!-- Wire XOR output → NOT -->
  <line x1="220" y1="94" x2="278" y2="94" class="w"/>

  <!-- NOT gate box -->
  <rect x="278" y="72" width="75" height="44" rx="6" class="g2"/>
  <text x="315" y="92"  text-anchor="middle" class="tb" fill="#be185d">NOT</text>
  <text x="315" y="108" text-anchor="middle" class="ti">&#126;(L&#8853;C)</text>

  <!-- Wire NOT output → OR top input -->
  <line x1="353" y1="94"  x2="388" y2="110" class="w"/>

  <!-- R wire: horizontal across, then bend up into OR -->
  <line x1="28"  y1="162" x2="373" y2="162" class="w"/>
  <line x1="373" y1="162" x2="388" y2="138" class="w"/>

  <!-- OR gate box -->
  <rect x="388" y="95" width="85" height="68" rx="6" class="g3"/>
  <text x="430" y="126" text-anchor="middle" class="tb" fill="#15803d">OR</text>
  <text x="430" y="142" text-anchor="middle" class="ti">R|&#126;(L&#8853;C)</text>

  <!-- Output wire -->
  <line x1="473" y1="129" x2="542" y2="129" class="w"/>
  <circle cx="542" cy="129" r="4" fill="#dc2626"/>
  <text x="549" y="134" class="tb" fill="#dc2626">next</text>

  <!-- Junction dots on input wires -->
  <circle cx="28" cy="79"  r="3" fill="#374151"/>
  <circle cx="28" cy="112" r="3" fill="#374151"/>
  <circle cx="28" cy="162" r="3" fill="#374151"/>

  <!-- Expression label at bottom -->
  <rect x="30" y="183" width="330" height="20" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="195" y="197" text-anchor="middle" font-family="monospace" font-size="11px" fill="#1e40af">SKY130HD mapping:  xor2_1 + inv_1 + or2_1  =  3 cells per CA cell</text>
</svg>
