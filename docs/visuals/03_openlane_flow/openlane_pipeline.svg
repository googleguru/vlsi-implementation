<svg xmlns="http://www.w3.org/2000/svg" width="680" height="740" viewBox="0 0 680 740">
  <style>
    .bg  { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1; }
    .s1  { fill:#dbeafe; stroke:#1d4ed8; stroke-width:2; }
    .s2  { fill:#dcfce7; stroke:#15803d; stroke-width:2; }
    .s3  { fill:#fef9c3; stroke:#ca8a04; stroke-width:2; }
    .s4  { fill:#fee2e2; stroke:#b91c1c; stroke-width:2; }
    .s5  { fill:#f3e8ff; stroke:#7c3aed; stroke-width:2; }
    .s6  { fill:#ffedd5; stroke:#c2410c; stroke-width:2; }
    .s7  { fill:#cffafe; stroke:#0891b2; stroke-width:2; }
    .s8  { fill:#fdf4ff; stroke:#a21caf; stroke-width:2; }
    .rtl { fill:#e0f2fe; stroke:#0369a1; stroke-width:2; }
    .gds { fill:#d1fae5; stroke:#065f46; stroke-width:2; }
    .w   { stroke:#374151; stroke-width:1.5; fill:none; }
    .skip{ fill:#f1f5f9; stroke:#94a3b8; stroke-width:1.5; stroke-dasharray:5,3; }
    .tb  { font-family:monospace; font-size:12px; font-weight:bold; }
    .tm  { font-family:monospace; font-size:11px; }
    .ti  { font-family:monospace; font-size:10px; fill:#6b7280; }
    .hl  { font-family:monospace; font-size:14px; font-weight:bold; }
  </style>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="680" height="740" rx="8" class="bg"/>
  <text x="340" y="26" text-anchor="middle" class="hl" fill="#1e3a5f">OpenLane RTL-to-GDSII Pipeline — tt_um_inverter</text>
  <text x="340" y="42" text-anchor="middle" class="ti">efabless/openlane:2023.07.19-1  ·  SKY130HD  ·  160×100 µm tile</text>

  <!-- RTL INPUT box -->
  <rect x="180" y="52" width="320" height="42" rx="6" class="rtl"/>
  <text x="340" y="70" text-anchor="middle" class="tb" fill="#0369a1">RTL Verilog Sources</text>
  <text x="340" y="86" text-anchor="middle" class="ti">inverter.v  ca235_cell.v  ca235_row.v  tt_um_inverter.v</text>

  <!-- Arrow to Stage 1 -->
  <line x1="340" y1="94" x2="340" y2="110" class="w" marker-end="url(#a)"/>

  <!-- Stage 1: Synthesis -->
  <rect x="60" y="110" width="560" height="72" rx="6" class="s1"/>
  <text x="340" y="130" text-anchor="middle" class="tb" fill="#1d4ed8">STAGE 1 · SYNTHESIS              [make synthesis]</text>
  <text x="80"  y="148" class="tm" fill="#374151">yosys → synth_sky130 → abc (AREA 0) → OpenSTA pre-place</text>
  <text x="80"  y="163" class="ti">OUT: results/synthesis/tt_um_inverter.v  |  reports/synthesis/opensta.min_max.rpt</text>

  <line x1="340" y1="182" x2="340" y2="198" class="w" marker-end="url(#a)"/>

  <!-- Stage 2: Floorplan -->
  <rect x="60" y="198" width="560" height="72" rx="6" class="s2"/>
  <text x="340" y="218" text-anchor="middle" class="tb" fill="#15803d">STAGE 2 · FLOORPLAN              [make floorplan]</text>
  <text x="80"  y="236" class="tm" fill="#374151">init_fp (die 160×100µm) → ioplacer → pdngen → tapcell</text>
  <text x="80"  y="251" class="ti">OUT: results/floorplan/tt_um_inverter.def  |  PDN: met1+met4+met5</text>

  <line x1="340" y1="270" x2="340" y2="286" class="w" marker-end="url(#a)"/>

  <!-- Stage 3: Placement -->
  <rect x="60" y="286" width="560" height="72" rx="6" class="s3"/>
  <text x="340" y="306" text-anchor="middle" class="tb" fill="#92400e">STAGE 3 · PLACEMENT             [make placement]</text>
  <text x="80"  y="324" class="tm" fill="#374151">RePLace (global, density=0.50) → Resizer → OpenDP (detail)</text>
  <text x="80"  y="339" class="ti">OUT: results/placement/tt_um_inverter.def  |  reports/placement/</text>

  <line x1="340" y1="358" x2="340" y2="374" class="w" marker-end="url(#a)"/>

  <!-- Stage 4: CTS (SKIPPED) -->
  <rect x="60" y="374" width="560" height="52" rx="6" class="skip"/>
  <text x="340" y="396" text-anchor="middle" class="tb" fill="#64748b">STAGE 4 · CTS                                    [SKIPPED — RUN_CTS=0]</text>
  <text x="80"  y="414" class="ti">Combinational design — 0 flip-flops, no clock tree required</text>

  <line x1="340" y1="426" x2="340" y2="442" class="w" marker-end="url(#a)"/>

  <!-- Stage 5: Routing -->
  <rect x="60" y="442" width="560" height="72" rx="6" class="s5"/>
  <text x="340" y="462" text-anchor="middle" class="tb" fill="#7c3aed">STAGE 5 · ROUTING                  [make routing]</text>
  <text x="80"  y="480" class="tm" fill="#374151">FastRoute (global, GRT_ADJ=0.3) → TritonRoute (detail DRC-clean)</text>
  <text x="80"  y="495" class="ti">OUT: results/routing/tt_um_inverter.def  |  .guide  |  antenna diodes inserted</text>

  <line x1="340" y1="514" x2="340" y2="530" class="w" marker-end="url(#a)"/>

  <!-- Stage 6: Extraction -->
  <rect x="60" y="530" width="560" height="72" rx="6" class="s6"/>
  <text x="340" y="550" text-anchor="middle" class="tb" fill="#c2410c">STAGE 6 · PARASITIC EXTRACTION    [make extraction]</text>
  <text x="80"  y="568" class="tm" fill="#374151">OpenRCX → R+C extraction → SPEF → OpenSTA post-route timing</text>
  <text x="80"  y="583" class="ti">OUT: results/routing/tt_um_inverter.spef  |  reports/routing/sta-rcx.min_max.rpt</text>

  <line x1="340" y1="602" x2="340" y2="618" class="w" marker-end="url(#a)"/>

  <!-- Stage 7: GDS stream-out -->
  <rect x="60" y="618" width="560" height="72" rx="6" class="s7"/>
  <text x="340" y="638" text-anchor="middle" class="tb" fill="#0891b2">STAGE 7 · GDS STREAM-OUT                [make gds]</text>
  <text x="80"  y="656" class="tm" fill="#374151">Magic (def2stream, sky130A.tech) + KLayout secondary stream-out + XOR</text>
  <text x="80"  y="671" class="ti">OUT: results/magic/tt_um_inverter.gds (SUBMIT)  |  results/magic/.lef  |  klayout/.gds</text>

  <line x1="340" y1="690" x2="340" y2="706" class="w" marker-end="url(#a)"/>

  <!-- Stage 8: Signoff -->
  <rect x="60" y="706" width="560" height="26" rx="6" class="s8"/>
  <text x="340" y="723" text-anchor="middle" class="tb" fill="#a21caf">STAGE 8 · SIGNOFF: Magic DRC + Netgen LVS + CVC antenna + OpenSTA  [make signoff]</text>
</svg>
