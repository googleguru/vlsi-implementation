<svg xmlns="http://www.w3.org/2000/svg" width="380" height="340" viewBox="0 0 380 340">
  <style>
    .bg  { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1; }
    .w   { stroke:#374151; stroke-width:2; fill:none; }
    .mos { fill:#e0f2fe; stroke:#0369a1; stroke-width:1.5; }
    .vdd { fill:#fef9c3; stroke:#ca8a04; stroke-width:1.5; }
    .vss { fill:#fce7f3; stroke:#be185d; stroke-width:1.5; }
    .tb  { font-family:monospace; font-size:13px; font-weight:bold; }
    .ti  { font-family:monospace; font-size:11px; }
    .hl  { font-family:monospace; font-size:14px; font-weight:bold; }
  </style>

  <rect width="380" height="340" rx="8" class="bg"/>
  <text x="190" y="24" text-anchor="middle" class="hl" fill="#1e3a5f">CMOS Inverter — sky130_fd_sc_hd__inv_1</text>

  <!-- VDD rail -->
  <rect x="140" y="38" width="100" height="28" rx="5" class="vdd"/>
  <text x="190" y="57" text-anchor="middle" class="tb" fill="#92400e">VDD  1.8 V</text>

  <!-- VSS rail -->
  <rect x="140" y="274" width="100" height="28" rx="5" class="vss"/>
  <text x="190" y="293" text-anchor="middle" class="tb" fill="#9d174d">VSS  0 V</text>

  <!-- VDD wire down to PMOS source -->
  <line x1="190" y1="66"  x2="190" y2="90"  class="w"/>

  <!-- PMOS transistor body -->
  <rect x="150" y="90" width="80" height="55" rx="5" class="mos"/>
  <text x="190" y="115" text-anchor="middle" class="tb" fill="#0369a1">PMOS</text>
  <text x="190" y="130" text-anchor="middle" class="ti" fill="#0369a1">(pull-up)</text>

  <!-- PMOS gate (IN) wire from left -->
  <line x1="70"  y1="117" x2="150" y2="117" class="w"/>
  <circle cx="70" cy="117" r="3" fill="#374151"/>
  <text x="28" y="121" class="tb" fill="#374151">IN</text>

  <!-- PMOS drain wire down to OUT node -->
  <line x1="190" y1="145" x2="190" y2="175" class="w"/>

  <!-- OUT node -->
  <circle cx="190" cy="175" r="5" fill="#dc2626"/>

  <!-- OUT wire to right -->
  <line x1="190" y1="175" x2="310" y2="175" class="w"/>
  <circle cx="310" cy="175" r="3" fill="#374151"/>
  <text x="318" y="180" class="tb" fill="#dc2626">OUT</text>
  <text x="318" y="195" class="ti" fill="#dc2626">= NOT IN</text>

  <!-- NMOS transistor body -->
  <rect x="150" y="195" width="80" height="55" rx="5" class="mos"/>
  <text x="190" y="220" text-anchor="middle" class="tb" fill="#0369a1">NMOS</text>
  <text x="190" y="235" text-anchor="middle" class="ti" fill="#0369a1">(pull-down)</text>

  <!-- NMOS gate — same IN wire, vertical connection -->
  <line x1="70"  y1="117" x2="70"  y2="222" class="w"/>
  <line x1="70"  y1="222" x2="150" y2="222" class="w"/>

  <!-- NMOS drain wire up to OUT node -->
  <line x1="190" y1="195" x2="190" y2="175" class="w"/>

  <!-- NMOS source wire down to VSS -->
  <line x1="190" y1="250" x2="190" y2="274" class="w"/>

  <!-- Truth table -->
  <rect x="22" y="310" width="336" height="22" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="190" y="325" text-anchor="middle" font-family="monospace" font-size="10px" fill="#1e40af">
    IN=0 → PMOS ON, NMOS OFF → OUT=1   |   IN=1 → PMOS OFF, NMOS ON → OUT=0
  </text>
</svg>
